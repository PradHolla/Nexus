services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: nexus-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_storage:/qdrant/storage
      - ./jobs.db:/app/jobs.db

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexus-backend
    ports:
      - "8000:8000"
    environment:
      - AWS_DEFAULT_REGION=${AWS_REGION:-us-east-1}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - PYTHONUNBUFFERED=1
    volumes:
      - ./jobs.db:/app/jobs.db
      - /tmp:/tmp
    depends_on:
      - qdrant

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Interpolate from your .env file, fallback to localhost
        - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:8000/api}
    container_name: nexus-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  qdrant_storage:
